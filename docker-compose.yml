services:
  api:
    build: ./apps/api
    # When DATABASE_URL points at the optional postgres service below, that
    # container can take a few seconds to accept connections after starting.
    # Compose can't conditionally depends_on a profile-gated service without
    # also forcing it into the default (sqlite) mode, so retry on failure
    # instead -- it converges once postgres finishes starting.
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./textune.db}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  # Optional Postgres backend. Enable with: docker compose --profile postgres up
  # then set DATABASE_URL=postgresql://textune:textune@postgres:5432/textune
  # in a root .env file (see .env.example) before starting.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: textune
      POSTGRES_PASSWORD: textune
      POSTGRES_DB: textune
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textune"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  web_node_modules:
  postgres_data:
